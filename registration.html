<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - DevBlog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

	<header class="bg-indigo-600 text-white shadow-md">
		<div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
			<h1 class="text-2xl font-bold tracking-tight">DevBlog</h1>
			
			<nav class="flex flex-col items-center gap-4 sm:flex-row sm:gap-6">
				<ul class="flex gap-4 text-sm font-medium">
					<li><a href="index.html" class="hover:text-indigo-200 transition">Головна</a></li>
					<li><a href="profile.html" class="hover:text-indigo-200 transition">Профіль</a></li>
					<li><a href="about.html" class="hover:text-indigo-200 transition">Про додаток</a></li>
				</ul>
				
				<div class="flex gap-2">
					<a href="login.html" class="bg-indigo-500 px-4 py-1.5 rounded-lg text-sm hover:bg-indigo-400 transition border border-indigo-400">
						Вхід
					</a>
					<a href="registration.html" class="border border-white px-4 py-1.5 rounded-lg text-sm hover:bg-white hover:text-indigo-600 transition">
						Реєстрація
					</a>
				</div>
			</nav>
		</div>
	</header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full bg-white shadow-xl rounded-xl border border-gray-100 p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-900">Створити акаунт</h2>
                <p class="text-gray-500 mt-2">Приєднуйтесь до нашої спільноти блогерів</p>
            </div>

            <form action="#" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Повне ім'я</label>
                    <input type="text" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="Іван Іванов">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Електронна пошта</label>
                    <input type="email" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="example@mail.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Стать</label>
                    <div class="flex space-x-4">
                        <label class="flex items-center">
                            <input type="radio" name="gender" value="male" class="text-indigo-600 focus:ring-indigo-500">
                            <span class="ml-2 text-sm text-gray-700">Чоловіча</span>
                        </label>
                        <label class="flex items-center">
                            <input type="radio" name="gender" value="female" class="text-indigo-600 focus:ring-indigo-500">
                            <span class="ml-2 text-sm text-gray-700">Жіноча</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Дата народження</label>
                    <input type="date" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Пароль</label>
                    <input type="password" required class="mt-1 block w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500 transition" placeholder="••••••••">
                </div>

                <button type="submit" class="w-full py-3 px-4 rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition duration-150">
                    Зареєструватися
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-gray-600">
                Вже маєте профіль? <a href="login.html" class="text-indigo-600 font-semibold hover:underline">Увійдіть тут</a>
            </p>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-300 py-6">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2026 Всі права захищені. Лабораторна робота №1.</p>
        </div>
    </footer>
	<script src="auth.js"></script>
</body>
</html>
